name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: 🚀 Build & Deploy to retroppies.com
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🚢 Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avzr --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: /var/www/retroppies/frontend/

      - name: ✅ Deploy Success
        run: echo "Deploy ke retroppies.com berhasil pada $(date)"
